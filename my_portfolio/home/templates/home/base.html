<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Raphid</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'home/css/style.css' %}">
</head>
<body>

    <!-- Navbar -->
    <nav id="navbar" class="navbar">
        <div class="navbar__container container">
            <a href="{% block home_link %}/{% endblock %}" class="navbar__logo">Home</a>
            <div class="navbar__links">
                <a href="/#about" class="navbar__link">About</a>
                <a href="/#skills" class="navbar__link">Skills</a>
                <a href="/#projects" class="navbar__link">Projects</a>
                <a href="/#experience" class="navbar__link">Experience</a>
                <a href="/#education" class="navbar__link">Education</a>
                <a href="/certificates/" class="navbar__link">Certificates</a>
                <a href="/#resume" class="navbar__link">Resume</a>
                <a href="/#contact" class="navbar__link">Contact</a>
            </div>
            <button id="mobile-menu-btn" class="navbar__mobile-btn">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
        </div>
        <div id="mobile-menu" class="navbar__mobile-menu">
            <a href="/#about" class="navbar__mobile-link">About</a>
            <a href="/#skills" class="navbar__mobile-link">Skills</a>
            <a href="/#projects" class="navbar__mobile-link">Projects</a>
            <a href="/#experience" class="navbar__mobile-link">Experience</a>
            <a href="/#education" class="navbar__mobile-link">Education</a>
            <a href="/certificates/" class="navbar__mobile-link">Certificates</a>
            <a href="/#resume" class="navbar__mobile-link">Resume</a>
            <a href="/#contact" class="navbar__mobile-link">Contact</a>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <!-- Footer -->
    <footer class="footer">
        <div class="footer__container container">
            <p class="footer__copy">&copy; 2026 Raphid. All rights reserved.</p>
            <a href="#hero" class="footer__back-to-top" title="Back to top">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"/>
                </svg>
            </a>
        </div>
    </footer>

    <script src="{% static 'home/js/main.js' %}"></script>
</body>
</html>
