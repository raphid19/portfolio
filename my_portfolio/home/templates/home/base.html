<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Raphid</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'home/css/style.css' %}">
</head>
<body class="bg-dark-900 text-white font-sans">

    <!-- Navbar -->
    <nav id="navbar" class="fixed top-0 w-full z-50 transition-all duration-300 bg-dark-900/80 backdrop-blur-md">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="{% block home_link %}/{% endblock %}" class="text-2xl font-bold bg-gradient-to-r from-accent-400 to-purple-400 bg-clip-text text-transparent">Home</a>
            <div class="hidden md:flex space-x-8">
                <a href="/#about" class="text-dark-300 hover:text-accent-400 transition-colors">About</a>
                <a href="/#skills" class="text-dark-300 hover:text-accent-400 transition-colors">Skills</a>
                <a href="/#projects" class="text-dark-300 hover:text-accent-400 transition-colors">Projects</a>
                <a href="/#experience" class="text-dark-300 hover:text-accent-400 transition-colors">Experience</a>
                <a href="/certificates/" class="text-dark-300 hover:text-accent-400 transition-colors">Certificates</a>
                <a href="/#contact" class="text-dark-300 hover:text-accent-400 transition-colors">Contact</a>
            </div>
            <button id="mobile-menu-btn" class="md:hidden text-white focus:outline-none">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-dark-800 border-t border-dark-700">
            <a href="/#about" class="block px-6 py-3 text-dark-300 hover:text-accent-400 hover:bg-dark-700 transition-colors">About</a>
            <a href="/#skills" class="block px-6 py-3 text-dark-300 hover:text-accent-400 hover:bg-dark-700 transition-colors">Skills</a>
            <a href="/#projects" class="block px-6 py-3 text-dark-300 hover:text-accent-400 hover:bg-dark-700 transition-colors">Projects</a>
            <a href="/#experience" class="block px-6 py-3 text-dark-300 hover:text-accent-400 hover:bg-dark-700 transition-colors">Experience</a>
            <a href="/certificates/" class="block px-6 py-3 text-dark-300 hover:text-accent-400 hover:bg-dark-700 transition-colors">Certificates</a>
            <a href="/#contact" class="block px-6 py-3 text-dark-300 hover:text-accent-400 hover:bg-dark-700 transition-colors">Contact</a>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <!-- Footer -->
    <footer class="py-8 px-6 border-t border-dark-700">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <p class="text-dark-400 text-sm">&copy; 2026 Raphid. All rights reserved.</p>
            <a href="#hero" class="w-10 h-10 rounded-full bg-dark-700 hover:bg-accent-500 flex items-center justify-center transition-all duration-300" title="Back to top">
                <svg class="w-5 h-5 text-dark-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"/>
                </svg>
            </a>
        </div>
    </footer>

    <script src="{% static 'home/js/main.js' %}"></script>
</body>
</html>
